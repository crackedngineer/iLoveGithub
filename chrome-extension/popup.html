<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Tools</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      max-height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #1a1b26;
      color: #a9b1d6;
      overflow-y: auto;
    }

    .popup-header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 16px;
      text-align: center;
      color: white;
    }

    .popup-title {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .popup-icon {
      font-size: 20px;
    }

    .popup-subtitle {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 4px;
    }

    .popup-section {
      padding: 16px;
      border-bottom: 1px solid #2a2e42;
    }

    .popup-section h3 {
      font-size: 14px;
      margin-bottom: 12px;
      color: #c0caf5;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .tool-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: #24283b;
      border: 1px solid #3b4261;
      border-radius: 8px;
      color: #a9b1d6;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 12px;
    }

    .tool-btn:hover {
      background: #2f3349;
      border-color: #6366f1;
      transform: translateY(-1px);
    }

    .tool-icon {
      font-size: 16px;
    }

    .search-container {
      display: flex;
      gap: 8px;
    }

    #github-search {
      flex: 1;
      padding: 10px;
      background: #24283b;
      border: 1px solid #3b4261;
      border-radius: 6px;
      color: #a9b1d6;
      font-size: 14px;
    }

    #github-search:focus {
      outline: none;
      border-color: #6366f1;
    }

    #search-btn {
      padding: 10px 12px;
      background: #6366f1;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    #search-btn:hover {
      background: #5856eb;
    }

    .popular-tools, .recent-repos {
      max-height: 150px;
      overflow-y: auto;
    }

    .popular-tool, .recent-repo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #2a2e42;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .popular-tool:last-child, .recent-repo:last-child {
      border-bottom: none;
    }

    .recent-repo:hover {
      color: #6366f1;
    }

    .tool-count {
      background: #6366f1;
      color: white;
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 11px;
    }

    .repo-time {
      font-size: 11px;
      color: #565f89;
    }

    .empty-state {
      text-align: center;
      color: #565f89;
      font-style: italic;
      padding: 20px 0;
    }

    .popup-footer {
      display: flex;
      border-top: 1px solid #2a2e42;
    }

    .footer-btn {
      flex: 1;
      padding: 12px;
      background: #24283b;
      border: none;
      border-right: 1px solid #2a2e42;
      color: #a9b1d6;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      transition: background 0.2s ease;
    }

    .footer-btn:last-child {
      border-right: none;
    }

    .footer-btn:hover {
      background: #2f3349;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #1a1b26;
    }

    ::-webkit-scrollbar-thumb {
      background: #3b4261;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #565f89;
    }
  </style>
</head>
<body>
  <div id="popup-container"></div>
  <script src="dist/popup.js"></script>
</body>
</html>
